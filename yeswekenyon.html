<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Jahre: Yes, we Kenyon! – AHS Kenyongasse</title>

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;

            font-family: Arial, sans-serif;
            color: #ffffff;
            text-align: center;

            background:
                linear-gradient(135deg, rgba(111, 168, 220, 0.9), rgba(164, 194, 244, 0.9)),
                url("https://www.kenyon.at/assets/images/4/bz-kenyongasse-0e39a3f7.webp");

            background-size: cover, 60%;
            background-position: center, center;
            background-repeat: no-repeat, no-repeat;
            background-attachment: fixed;
        }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            padding: 15px 30px;
            background-color: #C7DCD2;
            flex-shrink: 0;
        }

        header img {
            height: 70px;
            margin-right: 20px;
        }

        header h1 {
            font-size: 1.8em;
            margin: 0;
            color: #2f4f4f;
        }

        /* VIDEO-BEREICH */
        .central-video {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
        }

        .video-wrapper {
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16 / 9;

            background: rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            overflow: hidden;

            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
            display: block;
        }

        /* FOOTER */
        footer {
            padding: 20px;
            font-size: 0.9em;
            background-color: #C7DCD2;
            color: #2f4f4f;
            flex-shrink: 0;
        }

        .icon-upper-right {
            margin-left: auto;
            border-radius: 5px;
        }

        /* MOBILE */
        @media (max-width: 700px) {

            header {
                flex-direction: column;
                text-align: center;
            }

            header img {
                margin-bottom: 10px;
                margin-right: 0px;
            }

            .icon-upper-right {
                margin-top: 10px;
                margin-left: 0px;
                margin-right: 0px;
            }

            header h1 {
                font-size: 1.4em;
            }

            .central-video {
                padding: 15px;
            }

            .video-wrapper {
                border-radius: 12px;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="index.html"><img src="https://www.kenyon.at/assets/images/4/bz-kenyongasse-0e39a3f7.webp"
                alt="AHS Kenyongasse Logo"></a>
        <h1>100 Jahre AHS Kenyongasse</h1>
        <img class="icon-upper-right" src="Graphics/bg-yeswekenyon.jpg"></img>
    </header>

    <div class="central-video">
        <div class="video-wrapper">
            <video controls playsinline preload="metadata">
                <source src="#" type="video/mp4">
                Dein Browser unterstützt kein HTML5-Video.
            </video>
        </div>
    </div>

    <footer>
        © AHS Kenyongasse
    </footer>

</body>

</html>
